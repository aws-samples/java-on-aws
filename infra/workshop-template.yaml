                  - Arn
            ImageId:
              Ref: SsmParameterValueawsserviceamiamazonlinuxlatestal2023amikernel61x8664C96584B6F00A464EAD1953AFF4B05118Parameter
            InstanceType: m5.xlarge
            SecurityGroups:
              - GroupId:
                  Fn::GetAtt:
                    - IdeIdeSecurityGroup5C503C8A
                    - GroupId
              - GroupId:
                  Fn::GetAtt:
                    - IdeIdeInternalSecurityGroupD5D3B421
                    - GroupId
            SubnetId:
              Ref: VpcWorkshopVpcPublicSubnet1SubnetBCB45C45
            TagSpecifications:
              - ResourceType: instance
                Tags:
                  - Key: Name
                    Value: ide
                  - Key: Workshop
                    Value: "true"
            UserData:
              Fn::Base64:
                Fn::Join:
                  - ""
                  - - |-
                      #!/bin/bash
                      #!/bin/bash
                      set -e

                      # Generate unique log group name with runtime timestamp
                      LOG_GROUP_NAME="ide-bootstrap-$(date +%Y%m%d-%H%M%S)"
                      echo "Bootstrap logs will be written to CloudWatch log group: $LOG_GROUP_NAME"

                      # Install and configure CloudWatch agent for logging
                      echo "Installing CloudWatch agent..."
                      yum install -y amazon-cloudwatch-agent

                      # Create CloudWatch agent configuration
                      cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json << 'EOF'
                      {
                        "logs": {
                          "logs_collected": {
                            "files": {
                              "collect_list": [
                                {
                                  "file_path": "/var/log/bootstrap.log",
                                  "log_group_name": "$LOG_GROUP_NAME",
                                  "log_stream_name": "{instance_id}",
                                  "retention_in_days": 7
                                }
                              ]
                            }
                          }
                        }
                      }
                      EOF

                      # Start CloudWatch agent
                      /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
                        -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s

                      # Redirect all bootstrap output to log file and console
