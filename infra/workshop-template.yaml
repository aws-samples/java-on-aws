    Type: AWS::EC2::SpotFleet
    Properties:
      SpotFleetRequestConfigData:
        AllocationStrategy: diversified
        IamFleetRole:
          Fn::GetAtt:
            - RolesLambdaRole72F9D2A4
            - Arn
        LaunchSpecifications:
          - BlockDeviceMappings:
              - DeviceName: /dev/xvda
                Ebs:
                  DeleteOnTermination: true
                  VolumeSize: 50
                  VolumeType: gp3
            IamInstanceProfile:
              Arn:
                Fn::GetAtt:
