  IdeGetFleetInstanceFunction6BAEA50C:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import boto3

          def handler(event, context):
              if event['RequestType'] == 'Delete':
                  return {'PhysicalResourceId': 'none'}

              fleet_id = event['ResourceProperties']['FleetId']

              ec2 = boto3.client('ec2')
              response = ec2.describe_spot_fleet_instances(SpotFleetRequestId=fleet_id)

              if not response['ActiveInstances']:
                  raise Exception(f'No active instances in fleet {fleet_id}')

              instance_id = response['ActiveInstances'][0]['InstanceId']

              return {
                  'PhysicalResourceId': instance_id,
                  'Data': {'InstanceId': instance_id}
              }
      Handler: index.handler
      Role:
        Fn::GetAtt:
          - RolesLambdaRole72F9D2A4
          - Arn
      Runtime: python3.13
      Timeout: 120
    DependsOn:
      - RolesLambdaRoleDefaultPolicy90D67672
      - RolesLambdaRole72F9D2A4
  IdeGetFleetInstanceFunctionLogGroup58B47FFA:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Join:
          - ""
          - - /aws/lambda/
            - Ref: IdeGetFleetInstanceFunction6BAEA50C
      RetentionInDays: 731
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
  IdeIdeFleetInstanceResource61EE13AB:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - IdeGetFleetInstanceFunction6BAEA50C
          - Arn
      FleetId:
        Ref: IdeIdeFleet8557158C
    UpdateReplacePolicy: Delete
    DeletionPolicy: Delete
