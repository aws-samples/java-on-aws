# =============================================================================
# perf-analyzer — Spring Boot 4 / Spring AI 2 M5 / Amazon Bedrock (Claude 4.6)
# =============================================================================

spring:
  application:
    name: perf-analyzer
  threads:
    virtual:
      enabled: true
  jmx:
    enabled: false
  ai:
    bedrock:
      aws:
        region: ${AWS_REGION:us-east-1}
      converse:
        chat:
          options:
            # Overridable via SPRING_AI_BEDROCK_CONVERSE_CHAT_OPTIONS_MODEL.
            model: global.anthropic.claude-sonnet-4-6
            max-tokens: 10000

perf:
  analyzer:
    collector:
      namespace: monitoring
      pod-label: app=perf-collector

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
    prometheus:
      access: unrestricted
  metrics:
    enable:
      all: true
    tags:
      application: perf-analyzer
