# =============================================================================
# JVM Analysis Service - Spring Boot 4 Configuration
# =============================================================================
# AI-powered JVM performance analysis using Amazon Bedrock.
# Optimized for containerized deployments on EKS/ECS.
# =============================================================================

spring:
  application:
    name: jvm-ai-analyzer

  # Enable Virtual Threads (Java 21+) for improved scalability
  threads:
    virtual:
      enabled: true

  # Disable JMX to reduce memory footprint in containers
  jmx:
    enabled: false

  # Spring AI Bedrock configuration
  ai:
    bedrock:
      aws:
        region: ${AWS_REGION:us-east-1}
      anthropic:
        chat:
          enabled: true
          model: anthropic.claude-sonnet-4-20250514-v1:0
          options:
            max-tokens: 10000

# === JVM AI Analyzer Configuration ===
jvm-ai-analyzer:
  thread-dump:
    url-template: http://{podIp}:8080/actuator/threaddump
  s3:
    bucket: ${AWS_S3_BUCKET:jvm-ai-analyzer-bucket}
    prefix:
      analysis: analysis/
      profiling: profiling/

# === Server Configuration ===
server:
  error:
    include-message: always
  shutdown: graceful

# === Actuator/Management Configuration ===
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,threaddump

  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
    prometheus:
      access: unrestricted

  metrics:
    enable:
      all: true
    tags:
      application: jvm-ai-analyzer

# === Resilience4j Retry Configuration ===
resilience4j:
  retry:
    instances:
      threadDump:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
