# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
#
# Grouping strategy: related dependencies that are released and upgraded
# together are bundled into a single PR to cut review noise. Anything that
# does not match a group still gets its own PR (Dependabot's default).

version: 2
updates:
  - package-ecosystem: maven
    directories:
      - "**/*"
      # Exclude the vendored artifact pom shipped inside the authorization
      # server's META-INF/ (it is dependency metadata, not a buildable
      # module) so Dependabot stops opening noise PRs against it.
      - "!/samples/security/oauth/authorization-server/META-INF/**"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 15
    groups:
      # AWS SDK for Java artifacts are versioned in lockstep.
      awssdk:
        patterns:
          - "software.amazon.awssdk:*"
      # Spring Boot, Spring Framework, Spring AI and the Spring-adjacent
      # ecosystem move together on coordinated release trains. Bundling them
      # keeps a Boot/Spring AI upgrade to a single reviewable PR per module.
      spring:
        patterns:
          - "org.springframework:*"
          - "org.springframework.*:*"
          - "org.springaicommunity:*"
          - "io.awspring.cloud:*"
      # Build-time Maven plugins.
      maven-plugins:
        patterns:
          - "org.apache.maven.plugins:*"
          - "org.graalvm.buildtools:*"
          - "io.spring.javaformat:*"
          - "com.googlecode.maven-download-plugin:*"
      # Test tooling.
      testing:
        patterns:
          - "org.testcontainers:*"
          - "*testcontainers*"
          - "com.microsoft.playwright:*"
      # Kubernetes Java client artifacts release together.
      kubernetes:
        patterns:
          - "io.kubernetes:*"
  - package-ecosystem: docker
    directories:
      - "**/*"
    schedule:
      interval: "monthly"
    groups:
      docker-images:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: pip
    directory: "/infra/scripts/setup/thread-dump-lambda"
    schedule:
      interval: "monthly"
    groups:
      # awscli and boto3 share botocore/s3transfer; they must bump together
      # or pip resolution fails. Group them into a single PR.
      aws-python:
        patterns:
          - "awscli"
          - "boto3"
          - "botocore"
          - "s3transfer"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
